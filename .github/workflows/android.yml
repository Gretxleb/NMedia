name: Android CI

on:
  push:
    branches:
      - main
      - master
      - feature/*
      - fix/*
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: echo $FIREBASE_SECRET > ./app/google-services.json

      - run: chmod +x gradlew

      - run: ./gradlew build